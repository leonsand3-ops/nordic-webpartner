<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #06060F; display: flex; flex-direction: column; align-items: center; padding: 80px 60px; gap: 80px; }
  .row { display: flex; gap: 80px; align-items: flex-start; flex-wrap: wrap; justify-content: center; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 24px; }
  .bg { background: #06060F; padding: 40px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.04); }
  .label { color: #475569; font-family: 'Syne', sans-serif; font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; text-align: center; }
  .name { color: #E2E8F0; font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; letter-spacing: -0.01em; }
  h1 { color: #F8FAFC; font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; letter-spacing: -0.04em; opacity: 0.5; }
</style>
</head>
<body>
<h1>NORDIC WEBPARTNER — LOGO CONCEPTS</h1>

<div class="row">

  <!-- A: Wordmark-driven. Bara NW i Syne, med en fin understrykning -->
  <div class="item">
    <div class="bg">
      <svg width="160" height="160" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="ag" x1="30" y1="30" x2="130" y2="130" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#7DD3FC"/>
            <stop offset="100%" stop-color="#0284C7"/>
          </linearGradient>
        </defs>
        <!-- Single thin compass ring — very subtle -->
        <circle cx="80" cy="80" r="70" stroke="#0EA5E9" stroke-width="0.8" opacity="0.12"/>
        <!-- 4 minimal ticks -->
        <line x1="80" y1="10" x2="80" y2="22" stroke="#0EA5E9" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
        <line x1="80" y1="138" x2="80" y2="150" stroke="#0EA5E9" stroke-width="1" stroke-linecap="round" opacity="0.15"/>
        <line x1="10" y1="80" x2="22" y2="80" stroke="#0EA5E9" stroke-width="1" stroke-linecap="round" opacity="0.15"/>
        <line x1="138" y1="80" x2="150" y2="80" stroke="#0EA5E9" stroke-width="1" stroke-linecap="round" opacity="0.15"/>
        <!-- N — geometric, no rounded caps -->
        <path d="M24 112 L24 48 L56 96 L56 48" stroke="url(#ag)" stroke-width="7" stroke-linecap="square" stroke-linejoin="miter"/>
        <!-- W — matching weight -->
        <path d="M66 48 L80 100 L94 68 L108 100 L122 48" stroke="url(#ag)" stroke-width="6.5" stroke-linecap="square" stroke-linejoin="miter"/>
      </svg>
    </div>
    <span class="name">A — Geo Clean</span>
    <span class="label">Square caps · en ring</span>
  </div>

  <!-- B: Monogram mark — N och W sammanflätade i ett geometriskt tecken -->
  <div class="item">
    <div class="bg">
      <svg width="160" height="160" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="bg2" x1="20" y1="20" x2="140" y2="140" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#38BDF8"/>
            <stop offset="100%" stop-color="#0369A1"/>
          </linearGradient>
        </defs>
        <!-- Subtle background circle -->
        <circle cx="80" cy="80" r="72" stroke="#0EA5E9" stroke-width="0.7" opacity="0.1"/>
        <!-- North marker — small triangle -->
        <path d="M80 8 L84 18 L80 15 L76 18 Z" fill="#38BDF8" opacity="0.4"/>
        <!-- N: clean, geometric, left half -->
        <line x1="26" y1="114" x2="26" y2="46" stroke="url(#bg2)" stroke-width="8" stroke-linecap="butt"/>
        <line x1="26" y1="46"  x2="60" y2="102" stroke="url(#bg2)" stroke-width="8" stroke-linecap="butt"/>
        <line x1="60" y1="102" x2="60" y2="46" stroke="url(#bg2)" stroke-width="8" stroke-linecap="butt"/>
        <!-- divider dot -->
        <circle cx="80" cy="80" r="3" fill="#38BDF8" opacity="0.3"/>
        <!-- W: right half -->
        <line x1="100" y1="46" x2="112" y2="100" stroke="url(#bg2)" stroke-width="7" stroke-linecap="butt"/>
        <line x1="112" y1="100" x2="124" y2="68" stroke="url(#bg2)" stroke-width="7" stroke-linecap="butt"/>
        <line x1="124" y1="68" x2="136" y2="100" stroke="url(#bg2)" stroke-width="7" stroke-linecap="butt"/>
        <line x1="136" y1="100" x2="148" y2="46" stroke="url(#bg2)" stroke-width="7" stroke-linecap="butt"/>
      </svg>
    </div>
    <span class="name">B — Solid Lines</span>
    <span class="label">Raka kanter · bred W</span>
  </div>

  <!-- C: Ultra minimal — enbart NW kontur, ingen bakgrund alls, thin weight -->
  <div class="item">
    <div class="bg">
      <svg width="160" height="160" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="cg" x1="0" y1="0" x2="160" y2="160" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#BAE6FD"/>
            <stop offset="55%" stop-color="#38BDF8"/>
            <stop offset="100%" stop-color="#0EA5E9"/>
          </linearGradient>
        </defs>
        <!-- Zero compass bg — clean white space feel -->
        <!-- Very faint full circle -->
        <circle cx="80" cy="80" r="74" stroke="#1E293B" stroke-width="1" opacity="0.6"/>
        <!-- N — thin, elegant, tall -->
        <path d="M22 116 L22 44 L58 100 L58 44" stroke="url(#cg)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- W — thin, elegant -->
        <path d="M68 44 L80 98 L92 62 L104 98 L116 44" stroke="url(#cg)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- single dot below, centered — period mark -->
        <circle cx="80" cy="130" r="3.5" fill="#38BDF8" opacity="0.5"/>
      </svg>
    </div>
    <span class="name">C — Ultra Thin</span>
    <span class="label">Tunn · luftig · elegant</span>
  </div>

  <!-- D: Symbol mark — N+W hopbyggda i en enda kurva, flödande -->
  <div class="item">
    <div class="bg">
      <svg width="160" height="160" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="dg" x1="20" y1="40" x2="140" y2="120" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#7DD3FC"/>
            <stop offset="100%" stop-color="#0EA5E9"/>
          </linearGradient>
          <filter id="df">
            <feGaussianBlur stdDeviation="2" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <!-- Single circle badge -->
        <circle cx="80" cy="80" r="72" stroke="url(#dg)" stroke-width="1.5" opacity="0.3"/>
        <!-- N as filled angular shape -->
        <path d="M22 110 L22 50 L54 94 L54 50 L22 50" fill="none" stroke="url(#dg)" stroke-width="6" stroke-linejoin="round" stroke-linecap="round" filter="url(#df)"/>
        <!-- gap -->
        <!-- W as filled angular shape -->
        <path d="M64 50 L78 96 L92 64 L106 96 L120 50" fill="none" stroke="url(#dg)" stroke-width="5.5" stroke-linejoin="round" stroke-linecap="round" filter="url(#df)"/>
        <!-- north indicator: single line + dot -->
        <line x1="80" y1="8" x2="80" y2="20" stroke="#38BDF8" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
        <circle cx="80" cy="7" r="2" fill="#38BDF8" opacity="0.4"/>
      </svg>
    </div>
    <span class="name">D — Soft Glow</span>
    <span class="label">Mjuk glow · badge cirkel</span>
  </div>

  <!-- E: Offset / stacked — N stort uppe, W litet nere, modernistiskt -->
  <div class="item">
    <div class="bg">
      <svg width="160" height="160" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="eg" x1="0" y1="0" x2="160" y2="160" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#38BDF8"/>
            <stop offset="100%" stop-color="#0EA5E9"/>
          </linearGradient>
        </defs>
        <!-- Compass: just two arcs, not full circles -->
        <path d="M20 80 A60 60 0 0 1 140 80" stroke="#0EA5E9" stroke-width="0.7" fill="none" opacity="0.15"/>
        <path d="M30 80 A50 50 0 0 1 130 80" stroke="#0EA5E9" stroke-width="0.5" fill="none" opacity="0.1"/>
        <!-- N — dominates top half, large -->
        <path d="M18 96 L18 38 L60 84 L60 38" stroke="url(#eg)" stroke-width="7.5" stroke-linecap="square"/>
        <!-- Thin separator line -->
        <line x1="18" y1="104" x2="142" y2="104" stroke="#0EA5E9" stroke-width="0.6" opacity="0.25"/>
        <!-- W — bottom half, slightly smaller, offset right -->
        <path d="M66 122 L80 104 L94 116 L108 104 L122 122" stroke="url(#eg)" stroke-width="4" stroke-linecap="square" opacity="0.6"/>
        <!-- W label-size secondary below separator -->
        <path d="M66 96 L76 118 L86 102 L96 118 L106 96" stroke="url(#eg)" stroke-width="5" stroke-linecap="square" opacity="0"/>
      </svg>
    </div>
    <span class="name">E — Stacked</span>
    <span class="label">N dominant · W sekundär<br>modernistisk layout</span>
  </div>

</div>
</body>
</html>
