<!DOCTYPE html>
<html>
<head>
<style>
body { background: #06060F; display: flex; gap: 40px; padding: 60px; align-items: center; flex-wrap: wrap; }
.bg-dark { background: #06060F; padding: 20px; border-radius: 12px; }
.bg-light { background: #F8FAFC; padding: 20px; border-radius: 12px; }
p { color: #94A3B8; font-family: sans-serif; font-size: 12px; margin-top: 8px; text-align: center; }
</style>
</head>
<body>

<!-- VARIANT A: Stiliserad kompassnål + NW -->
<div>
<div class="bg-dark">
<svg width="160" height="160" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gA1" x1="0" y1="0" x2="160" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="60%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="gA2" x1="160" y1="0" x2="0" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <!-- Outer ring -->
  <circle cx="80" cy="80" r="72" stroke="url(#gA1)" stroke-width="1.5" opacity="0.3"/>
  <!-- Inner ring -->
  <circle cx="80" cy="80" r="54" stroke="url(#gA1)" stroke-width="1" opacity="0.15"/>
  <!-- 4 compass points - thin elegant -->
  <polygon points="80,8 86,74 80,80 74,74" fill="url(#gA1)" opacity="0.9"/>
  <polygon points="80,152 86,86 80,80 74,86" fill="url(#gA1)" opacity="0.25"/>
  <polygon points="8,80 74,74 80,80 74,86" fill="url(#gA1)" opacity="0.25"/>
  <polygon points="152,80 86,74 80,80 86,86" fill="url(#gA1)" opacity="0.25"/>
  <!-- N letterform integrated -->
  <path d="M52 104V56L80 96V56" stroke="url(#gA1)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- W letterform -->
  <path d="M86 56L96 96L106 56" stroke="url(#gA1)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Center dot -->
  <circle cx="80" cy="80" r="4" fill="url(#gA1)"/>
</svg>
</div>
<p>Variant A: Kompass + NW</p>
</div>

<!-- VARIANT B: Abstrakt hexagonal N-form -->
<div>
<div class="bg-dark">
<svg width="160" height="160" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gB1" x1="20" y1="20" x2="140" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="12" y="12" width="136" height="136" rx="32" fill="url(#gB1)" opacity="0.1"/>
  <rect x="12" y="12" width="136" height="136" rx="32" stroke="url(#gB1)" stroke-width="1.5" opacity="0.4"/>
  <!-- Bold NW mark -->
  <!-- N: left pillar, diagonal, right pillar -->
  <line x1="32" y1="110" x2="32" y2="50" stroke="url(#gB1)" stroke-width="9" stroke-linecap="round"/>
  <line x1="32" y1="50" x2="70" y2="110" stroke="url(#gB1)" stroke-width="9" stroke-linecap="round"/>
  <line x1="70" y1="110" x2="70" y2="50" stroke="url(#gB1)" stroke-width="9" stroke-linecap="round"/>
  <!-- W: M inverted -->
  <line x1="76" y1="50" x2="86" y2="90" stroke="url(#gB1)" stroke-width="7" stroke-linecap="round"/>
  <line x1="86" y1="90" x2="96" y2="60" stroke="url(#gB1)" stroke-width="7" stroke-linecap="round"/>
  <line x1="96" y1="60" x2="106" y2="90" stroke="url(#gB1)" stroke-width="7" stroke-linecap="round"/>
  <line x1="106" y1="90" x2="116" y2="50" stroke="url(#gB1)" stroke-width="7" stroke-linecap="round"/>
  <!-- Dot accent bottom right -->
  <circle cx="128" cy="118" r="7" fill="url(#gB1)"/>
</svg>
</div>
<p>Variant B: Box NW</p>
</div>

<!-- VARIANT C: Minimalistisk N-pilspets (Nordic arrow) -->
<div>
<div class="bg-dark">
<svg width="160" height="160" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gC1" x1="30" y1="160" x2="130" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="gC2" x1="0" y1="0" x2="160" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  <!-- Main N-shape as geometric arrow pointing up (Nordic = North) -->
  <!-- Left side of N -->
  <path d="M36 120 L36 40 L80 100 L80 40 L80 40" stroke="url(#gC1)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Right W-mark - smaller, elegant -->
  <path d="M90 50 L100 95 L110 65 L120 95 L130 50" stroke="url(#gC2)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Accent: small north star above N -->
  <path d="M80 16 L82 22 L88 22 L83 26 L85 32 L80 28 L75 32 L77 26 L72 22 L78 22 Z" fill="url(#gC1)" opacity="0.9"/>
</svg>
</div>
<p>Variant C: North Arrow + Star</p>
</div>

<!-- VARIANT D: Modern geometric mark (web-links + N) -->
<div>
<div class="bg-dark">
<svg width="160" height="160" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gD1" x1="0" y1="0" x2="160" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="50%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Hexagon -->
  <path d="M80 14 L140 47 L140 113 L80 146 L20 113 L20 47 Z" stroke="url(#gD1)" stroke-width="2" fill="none" opacity="0.5"/>
  <!-- Inner hexagon -->
  <path d="M80 34 L124 59 L124 109 L80 134 L36 109 L36 59 Z" stroke="url(#gD1)" stroke-width="1" fill="url(#gD1)" fill-opacity="0.04" opacity="0.3"/>
  <!-- Large N as main mark, centered -->
  <path d="M44 108 L44 52 L96 108 L96 52" stroke="url(#gD1)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)"/>
  <!-- Small W to right -->
  <path d="M104 58 L112 92 L120 70 L128 92 L136 58" stroke="url(#gD1)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.7"/>
</svg>
</div>
<p>Variant D: Hexagon + NW glow</p>
</div>

</body>
</html>
